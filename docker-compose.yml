services:
  postgres:
    image: postgres:16-alpine
    container_name: rag-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rag_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rag-redis
    command: redis-server --requirepass redis123456
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123456", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: rag-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/docker-entrypoint.sh:/docker-entrypoint.sh
      - ./backend/api/chat.py:/app/api/chat.py
      - ./backend/utils/rerank.py:/app/utils/rerank.py
      - ./backend/core/chroma_conn.py:/app/core/chroma_conn.py
      - ./backend/services/rag_service.py:/app/services/rag_service.py
      - ./backend/main.py:/app/main.py
      - ./backend/uploads:/app/uploads
      - ./backend/vector_store:/app/vector_store
      - ./backend/logs:/app/logs
      - ${MODELS_VOLUME:-/opt/hf_models}:/models
    env_file:
      - .env
    environment:
      - REDIS_PASSWORD=redis123456
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    # 重要: 不要用 unless-stopped 或 always.
    # Windows Docker (WDDM) 的 CUDA context 仅 ~2MB, GPU 模型加载必然失败。
    # CPU fallback 已实现，但 restart: unless-stopped 仍会不断重启导致日志爆炸。
    # 手动运行: docker compose start/stop (不要 down/up, 不要 force-recreate)
    restart: no

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: rag-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: